<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miratech - Manutenção de Computadores</title>
    <link rel="stylesheet" type="text/css" href="style-m.css">
    
    <script src="https://kit.fontawesome.com/357829cc7c.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <style>
        #consulta-reparo {
            background-color: #f8f9fa;
            padding: 50px 20px;
            text-align: center;
            display: none; /* Mantido oculto por padrão */
        }
        .consulta-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background: #fff;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .consulta-titulo {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            color: #333;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="#"><img src="images/LOGO.png" alt="Logotipo da Miratech" width="150"></a>
        </div>
        <nav>
            <ul>
                <li><a href="#servicos">Serviços</a></li>
                <li><a href="#galeria">Portfólio</a></li>
                <li><a href="#sobre">Sobre Nós</a></li>
                <li><a href="#redes">Redes Sociais</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="banner">
            <h2>Soluções Rápidas para o Seu Computador!</h2>
            <a href="https://wa.me/+5588997406903?text=Olá!" target="_blank" class="btn-contato whatsapp">
                <i class="fab fa-whatsapp"></i> Solicite um Orçamento
            </a>
        </section>

        <section id="consulta-reparo">
            <div class="container">
                <h2 class="consulta-titulo"><i class="fas fa-microchip"></i> Acompanhe sua Manutenção</h2>
                <div class="consulta-container" style="position: relative; min-height: 400px; overflow: hidden;">
                    
                    <div id="loading-miratech" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1;">
                        <i class="fas fa-sync fa-spin" style="font-size: 40px; color: #007bff;"></i>
                        <p style="font-family: 'Oswald', sans-serif; margin-top: 15px;">CARREGANDO SISTEMA...</p>
                    </div>

                    <iframe 
                      id="iframe-miratech"
                      src="https://script.google.com/macros/s/AKfycbzHdZTJUE9h48bPEIBcFoncjLyoNrmwclWs9SV8HtDbU9RTNhQ-C7pJTy1JaYJCFAk/exec" 
                      width="100%" 
                      height="750px" 
                      frameborder="0" 
                      style="border: none; border-radius: 15px; position: relative; z-index: 2; background: transparent;"
                      onload="document.getElementById('loading-miratech').style.display='none';">
                    </iframe>
                </div>
            </div>
        </section>

        <section id="servicos" class="container">
            <h2>Nossos Serviços</h2>
            <div class="servicos-grid"> 
                <article class="servico-card">
                    <h3>Limpeza e Otimização</h3>
                    <p>PC lento? Nós resolvemos.</p>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; Miratech 2026. Todos os direitos reservados.</p>
    </footer>

    <script>
        function ativarConsulta() {
            const urlParams = new URLSearchParams(window.location.search);
            const osId = urlParams.get('os');
            const hash = window.location.hash;
            const secao = document.getElementById('consulta-reparo');
            const iframe = document.getElementById('iframe-miratech');

            // Se tiver OS na URL ou a TAG de consulta reparo no link
            if (osId || hash === '#consulta-reparo') {
                secao.style.display = 'block'; // Mostra a seção

                // Se tiver o número da OS, atualiza o iframe com ele
                if (osId) {
                    iframe.src = "https://script.google.com/macros/s/AKfycbzHdZTJUE9h48bPEIBcFoncjLyoNrmwclWs9SV8HtDbU9RTNhQ-C7pJTy1JaYJCFAk/exec?os=" + osId;
                }

                // Rola para a seção
                setTimeout(() => {
                    secao.scrollIntoView({ behavior: 'smooth' });
                }, 500);
            }
        }

        // Roda ao carregar
        window.onload = ativarConsulta;
        // Roda se o link mudar (clique em menu)
        window.onhashchange = ativarConsulta;
    </script>
</body>
</html>
